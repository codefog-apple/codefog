name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (e.g. 1.0.0)'
        required: true
        type: string
      release_notes:
        description: '更新说明'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must be in semver format (x.y.z)"
            exit 1
          fi

      - name: Check if tag exists
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "Error: Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: CodeFog v${{ inputs.version }}
          body: |
            ## CodeFog v${{ inputs.version }}

            ${{ inputs.release_notes || '查看 CHANGELOG 获取详细变更记录' }}

            ### 下载

            | 平台 | 架构 | 下载 |
            |------|------|------|
            | macOS | Apple Silicon (M1/M2/M3/M4) | `CodeFog-${{ inputs.version }}-arm64.dmg` |
            | macOS | Intel | `CodeFog-${{ inputs.version }}-x64.dmg` |

            ### 安装说明

            1. 下载对应架构的 `.dmg` 文件
            2. 打开 DMG，将 CodeFog 拖入 Applications
            3. 首次运行可能需要在「系统设置 → 隐私与安全性」中允许

            ---
            **官网**: [codefog.cc](https://codefog.cc)
          draft: false
          prerelease: false
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
